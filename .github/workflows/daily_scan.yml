name: 📋 Escaneo Diario — Diario Oficial

on:
  schedule:
    - cron: '0 13 * * 1-5'

  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de escaneo'
        required: true
        default: 'diario'
        type: choice
        options:
          - diario
          - historico

jobs:
  escanear:
    name: Escanear Diario Oficial
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🔍 Ejecutar escaneo diario
        if: ${{ github.event_name == 'schedule' || inputs.modo == 'diario' }}
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: python scraper.py

      - name: 📚 Ejecutar escaneo histórico (15-02-2025 → hoy)
        if: ${{ inputs.modo == 'historico' }}
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
        run: python scraper.py --historical

      - name: 💾 Commitear datos actualizados
        run: |
          git config user.name  "Monitor DO Bot"
          git config user.email "monitor-do@noreply.github.com"
          git add data/publications.json
          git diff --staged --quiet || git commit -m "📊 Actualización DO $(date +'%d-%m-%Y')"
          git push
